        function render() {
            const container = document.getElementById('listContainer');
            
            container.innerHTML = studyData.map(day => `
                <div class="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Day ${day.day}</span>
                        <span class="text-sm text-slate-400 font-medium">${day.date}</span>
                    </div>
                    
                    <h2 class="text-xl font-bold text-center text-slate-800 mb-8 italic">"${day.topic}"</h2>
                    
                    <div class="grid grid-cols-3 gap-3 mb-10">
                        ${day.items.map(item => `
                            <div class="vocab-box" onclick="this.classList.toggle('active')">
                                <span class="text-blue-600 font-bold text-sm md:text-base leading-tight">${item.exp}</span>
                                <div class="hidden-content text-left">
                                    <p class="text-xs font-bold text-slate-700 mb-1">${item.mean}</p>
                                    <p class="text-[10px] text-slate-500 italic font-mono leading-relaxed bg-slate-50 p-2 rounded-lg">${item.ex}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="space-y-8">
                        ${day.dialogue.length > 0 ? `
                        <section>
                            <h3 class="section-title text-base">🗨️ Dialogue</h3>
                            <div class="bg-slate-50 p-5 rounded-2xl space-y-4 border border-slate-100">
                                ${day.dialogue.map(d => `
                                    <div class="flex gap-3">
                                        <span class="font-bold text-xs ${d.spk === 'Jini' ? 'text-pink-500' : 'text-blue-600'} w-10 shrink-0">${d.spk}</span>
                                        <div class="text-sm">
                                            <p class="text-slate-800 font-semibold">${d.en}</p>
                                            <p class="text-slate-400 text-xs mt-1">${d.ko}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>` : ''}

                        ${day.feedback.length > 0 ? `
                        <section>
                            <h3 class="section-title text-base">🎙️ Pronunciation & Feedback</h3>
                            <ul class="list-disc list-inside text-sm text-slate-600 space-y-2 px-2 leading-relaxed">
                                ${day.feedback.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </section>` : ''}

                        <section class="pt-6 border-t border-dashed border-slate-200">
                            <div class="text-center">
                                <p class="text-orange-500 text-sm font-medium">💡 ${day.closing}</p>
                            </div>
                        </section>
                    </div>
                </div>
            `).join('');
        }

        // 박스 클릭 핸들러
        document.addEventListener('click', function(e) {
            const box = e.target.closest('.vocab-box');
            if (box) {
                const content = box.querySelector('.hidden-content');
                content.style.display = box.classList.contains('active') ? 'block' : 'none';
            }
        });

        render();
    </script>
