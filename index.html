    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        /* =========================================
           테마 색상 정의 (CSS Variables)
           ========================================= */
        :root {
            /* 기본: 다크 모드 (어둡고 차분한 느낌) */
            --bg-body: #0f172a;           /* slate-900 */
            --bg-box: #1e293b;            /* slate-800 */
            --text-main: #cbd5e1;         /* slate-300 */
            --text-heading: #f8fafc;      /* slate-50 */
            --border-box: #334155;        /* slate-700 */
            --stats-color: #60a5fa;       /* blue-400 */
            --accent-active: #60a5fa;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body.light-mode {
            /* 활성화: 밝은 모드 (명랑하고 다채로운 느낌) */
            --bg-body: #fdfbf6;           /* 아주 연한 크림 화이트 (밝고 따뜻함) */
            --bg-box: #ffffff;            /* 순백색 박스 */
            --text-main: #475569;         /* slate-600 */
            --text-heading: #1e1b4b;      /* indigo-950 (진한 네이비 블루) */
            --border-box: #e0f2fe;        /* sky-100 (연한 파스텔 블루) */
            --stats-color: #ec4899;       /* pink-500 (명랑한 포인트 색상) */
            --accent-active: #3b82f6;      /* blue-500 */
            --box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.07); /* 아주 연한 파란색 그림자 */
        }

        /* =========================================
           기본 스타일 적용
           ========================================= */
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            /* 테마 변경 시 부드러운 전환 효과 */
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
            -webkit-tap-highlight-color: transparent; 
        }

        /* 메인 제목 스타일 (HTML의 Tailwind 클래스보다 우선 적용) */
        h1.main-title { 
            color: var(--text-heading) !important; 
            transition: color 0.4s ease;
        }

        /* 통계(Stats) 스타일 */
        #stats {
            color: var(--stats-color) !important;
            transition: color 0.4s ease;
        }

        /* 단어장 박스 기본 상태 */
        .vocab-box { 
            transition: all 0.3s ease-in-out; 
            border: 2px solid var(--border-box); 
            cursor: pointer; 
            height: 120px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            border-radius: 1.25rem; 
            padding: 12px; 
            background-color: var(--bg-box); 
            box-shadow: var(--box-shadow);
        }
        
        /* 박스 활성화(클릭) 상태 */
        .vocab-box.active { 
            height: auto; 
            border-color: var(--accent-active); 
            background-color: var(--bg-body); /* 배경색과 통일감을 줌 */
            box-shadow: 0 10px 20px rgba(96, 165, 250, 0.15);
        }
        
        /* 숨겨진 콘텐츠 area */
        .hidden-content { 
            display: none; 
            margin-top: 12px; 
            width: 100%; 
            border-top: 1px solid var(--border-box); 
            padding-top: 0.75rem; 
        }
        
        /* 섹션 소제목 (예: 의미, 예문) */
        .section-title { 
            border-left: 4px solid var(--accent-active); 
            padding-left: 10px; 
            font-weight: 700; 
            color: var(--text-heading); 
            margin-bottom: 1rem; 
            transition: color 0.4s ease;
        }
    </style>
</head>

        // =========================================
        // 낮/밤 시간에 따른 테마 자동 변경 스크립트
        // =========================================
        function applyThemeBasedOnTime() {
            const now = new Date();
            const hour = now.getHours();
            
            // 낮 시간 설정: 오전 7시 ~ 오후 6시 59분 (7:00 ~ 18:59)
            const isDayTime = hour >= 7 && hour < 19;
            
            if (isDayTime) {
                // 낮이면 밝은 모드 클래스 추가
                document.body.classList.add('light-mode');
            } else {
                // 밤이면 밝은 모드 클래스 제거 (기본 다크 모드)
                document.body.classList.remove('light-mode');
            }
        }

        // 1. 페이지가 로드될 때 즉시 실행
        applyThemeBasedOnTime();
        
        // 2. 1분마다 시간을 체크하여 실시간으로 테마 변경
        setInterval(applyThemeBasedOnTime, 60000);

        function render() {
            const container = document.getElementById('listContainer');
            
            container.innerHTML = studyData.map(day => `
                <div class="bg-slate-800 rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-700">
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-blue-900 text-blue-200 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">Day ${day.day}</span>
                        <span class="text-sm text-slate-400 font-medium">${day.date}</span>
                    </div>
                    
                    <h2 class="text-xl font-bold text-center text-slate-100 mb-8 italic">"${day.topic}"</h2>
                    
                    <div class="grid grid-cols-3 gap-3 mb-10">
                        ${(day.items || []).map(item => `
                            <div class="vocab-box" onclick="this.classList.toggle('active')">
                                <span class="text-blue-400 font-bold text-sm md:text-base leading-tight">${item.exp}</span>
                                <div class="hidden-content text-left">
                                    <p class="text-xs font-bold text-slate-200 mb-1">${item.mean}</p>
                                    <p class="text-[10px] text-slate-300 italic font-mono leading-relaxed bg-slate-700 p-2 rounded-lg">${item.ex}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="space-y-8">
                        ${day.dialogue && day.dialogue.length > 0 ? `
                        <section>
                            <h3 class="section-title text-base">🗨️ Dialogue</h3>
                            <div class="bg-slate-700 p-5 rounded-2xl space-y-4 border border-slate-600">
                                ${day.dialogue.map(d => `
                                    <div class="flex gap-3">
                                        <span class="font-bold text-xs ${d.spk === 'Jini' ? 'text-pink-400' : 'text-blue-400'} w-10 shrink-0">${d.spk}</span>
                                        <div class="text-sm">
                                            <p class="text-slate-200 font-semibold">${d.en}</p>
                                            <p class="text-slate-400 text-xs mt-1">${d.ko}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>` : ''}

                        ${day.feedback && day.feedback.length > 0 ? `
                        <section>
                            <h3 class="section-title text-base">🎙️ Pronunciation & Feedback</h3>
                            <ul class="list-disc list-inside text-sm text-slate-300 space-y-2 px-2 leading-relaxed">
                                ${day.feedback.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </section>` : ''}

                        <section class="pt-6 border-t border-dashed border-slate-600">
                            <div class="text-center">
                                <p class="text-orange-400 text-sm font-medium">💡 ${day.closing}</p>
                            </div>
                        </section>
                    </div>
                </div>
            `).join('');
        }

        // 박스 클릭 핸들러
        document.addEventListener('click', function(e) {
            const box = e.target.closest('.vocab-box');
            if (box) {
                const content = box.querySelector('.hidden-content');
                content.style.display = box.classList.contains('active') ? 'block' : 'none';
            }
        });

        render();
    </script>
