<head>
    <meta charset="UTF-8">

    <title>My Daily English Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; /* 어두운 슬레이트 배경 */
            color: #cbd5e1; /* 기본 텍스트 색상 (밝은 회색) */
            -webkit-tap-highlight-color: transparent; 
        }
        .vocab-box { 
            transition: all 0.2s ease-in-out; 
            border: 2px solid #334155; /* 어두운 테두리 */
            cursor: pointer; 
            height: 120px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            border-radius: 1.25rem; 
            padding: 12px; 
            background-color: #1e293b; /* 카드 기본 배경색 */
        }
        .vocab-box.active { 
            height: auto; 
            border-color: #3b82f6; 
            background-color: #1e3a8a; /* 클릭 시 활성화되는 부드러운 푸른 배경 */
        }
        .hidden-content { 
            display: none; 
            margin-top: 12px; 
            width: 100%; 
            border-top: 1px solid #334155; 
            padding-top: 12px; 
        }
        .section-title { 
            border-left: 4px solid #3b82f6; 
            padding-left: 10px; 
            font-weight: 700; 
            color: #f8fafc; /* 섹션 타이틀 밝게 */
            margin-bottom: 1rem; 
        }
    </style>
</head>
